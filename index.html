<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QuoteForge - Words That Move You</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
:root{--bg:#0d0d0d;--card:rgba(20,20,20,0.85);--gold:#d4a574;--silver:#c0c0c0;--text:#e8e4e0;--dim:#666;--font-serif:'Cormorant Garamond',serif;--font-sans:'Inter',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:var(--font-sans);background:var(--bg);color:var(--text)}
canvas#bg{position:fixed;inset:0;z-index:0}
audio{display:none}
.screen{position:fixed;inset:0;display:none;justify-content:center;align-items:center;z-index:10;padding:20px}
.screen.active{display:flex}
.card{background:var(--card);backdrop-filter:blur(20px);border:1px solid rgba(212,165,116,0.12);border-radius:16px;padding:40px;text-align:center;max-width:520px;width:90%;animation:fadeUp .7s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
.badge{display:inline-block;padding:5px 14px;background:rgba(212,165,116,0.08);border:1px solid rgba(212,165,116,0.2);border-radius:20px;font-size:.6rem;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:20px}
h1{font-family:var(--font-serif);font-size:3rem;font-weight:700;margin-bottom:8px}
h1 em{color:var(--gold)}
.subtitle{color:var(--dim);font-size:.9rem;margin-bottom:24px;line-height:1.5}
.hint{font-size:.65rem;color:var(--dim);margin-top:14px}
.gold-btn{padding:14px 36px;background:transparent;border:1.5px solid var(--gold);color:var(--gold);font-family:var(--font-serif);font-size:1rem;font-weight:600;letter-spacing:2px;border-radius:10px;cursor:pointer;transition:all .3s}
.gold-btn:hover{background:var(--gold);color:var(--bg);box-shadow:0 0 30px rgba(212,165,116,.25);transform:translateY(-2px)}
#quote-screen.active{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px}
.quote-container{max-width:700px;width:90%;text-align:center;z-index:10;perspective:600px}
.quote-text{font-family:var(--font-serif);font-size:2rem;font-weight:400;line-height:1.6;color:var(--text);margin-bottom:16px;animation:quoteReveal .8s ease}
@keyframes quoteReveal{from{opacity:0;transform:translateY(20px) rotateX(10deg)}to{opacity:1;transform:none}}
.quote-author{font-family:var(--font-sans);font-size:.8rem;letter-spacing:3px;text-transform:uppercase;color:var(--gold);opacity:.7}
.quote-category{display:inline-block;margin-top:12px;padding:4px 12px;background:rgba(212,165,116,.06);border:1px solid rgba(212,165,116,.12);border-radius:12px;font-size:.65rem;letter-spacing:1px;color:var(--dim)}
.controls{display:flex;gap:12px;z-index:10}
.ctrl-btn{padding:10px 20px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:10px;color:var(--dim);font-size:.8rem;cursor:pointer;transition:all .3s}
.ctrl-btn:hover{border-color:rgba(212,165,116,.3);color:var(--gold)}
.ctrl-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(212,165,116,.06)}
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;z-index:10}
.favorites-count{position:fixed;top:20px;right:20px;padding:8px 14px;background:var(--card);border:1px solid rgba(212,165,116,.12);border-radius:10px;font-size:.75rem;color:var(--gold);z-index:20;display:none}
.favorites-count.visible{display:block}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);padding:10px 20px;background:var(--gold);color:var(--bg);border-radius:8px;font-size:.8rem;font-weight:500;opacity:0;transition:all .4s;z-index:100;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:600px){h1{font-size:2rem}.quote-text{font-size:1.4rem}.card{padding:28px 20px}.controls{flex-wrap:wrap;justify-content:center}}
    </style>
</head>
<body>
    <audio id="bg-audio" loop preload="none">
        <source src="https://cdn.pixabay.com/audio/2022/10/30/audio_84443f9c93.mp3" type="audio/mpeg">
    </audio>
    <canvas id="bg"></canvas>

    <div id="intro-screen" class="screen active">
        <div class="card">
            <div class="badge">VishwaNova 2026 • Inspiration</div>
            <h1>Quote<em>Forge</em></h1>
            <p class="subtitle">Beautiful words, beautifully delivered. Get inspired with curated quotes from history's greatest minds.</p>
            <button id="start-btn" class="gold-btn">Begin the Journey</button>
            <p class="hint">🎵 Includes ambient background music</p>
        </div>
    </div>

    <div id="quote-screen" class="screen">
        <div class="filter-bar">
            <button class="ctrl-btn active" data-cat="all">All</button>
            <button class="ctrl-btn" data-cat="wisdom">🧠 Wisdom</button>
            <button class="ctrl-btn" data-cat="courage">⚔️ Courage</button>
            <button class="ctrl-btn" data-cat="love">❤️ Love</button>
            <button class="ctrl-btn" data-cat="humor">😄 Humor</button>
            <button class="ctrl-btn" data-cat="science">🔬 Science</button>
        </div>
        <div class="quote-container">
            <p class="quote-text" id="quote-text"></p>
            <p class="quote-author" id="quote-author"></p>
            <span class="quote-category" id="quote-category"></span>
        </div>
        <div class="controls">
            <button class="ctrl-btn" id="btn-prev">← Previous</button>
            <button class="ctrl-btn" id="btn-fav">♡ Save</button>
            <button class="ctrl-btn" id="btn-copy">📋 Copy</button>
            <button class="ctrl-btn" id="btn-next">Next →</button>
        </div>
    </div>

    <div class="favorites-count" id="fav-count">♡ <span id="fav-num">0</span> saved</div>
    <div class="toast" id="toast"></div>

    <script>
const quotes=[
{text:"The only way to do great work is to love what you do.",author:"Steve Jobs",cat:"wisdom"},
{text:"In the middle of difficulty lies opportunity.",author:"Albert Einstein",cat:"wisdom"},
{text:"Be the change you wish to see in the world.",author:"Mahatma Gandhi",cat:"courage"},
{text:"To be yourself in a world that is constantly trying to make you something else is the greatest accomplishment.",author:"Ralph Waldo Emerson",cat:"courage"},
{text:"The best time to plant a tree was 20 years ago. The second best time is now.",author:"Chinese Proverb",cat:"wisdom"},
{text:"Love all, trust a few, do wrong to none.",author:"William Shakespeare",cat:"love"},
{text:"The heart has its reasons which reason knows nothing of.",author:"Blaise Pascal",cat:"love"},
{text:"Where there is love there is life.",author:"Mahatma Gandhi",cat:"love"},
{text:"You miss 100% of the shots you don't take.",author:"Wayne Gretzky",cat:"courage"},
{text:"The greatest glory in living lies not in never falling, but in rising every time we fall.",author:"Nelson Mandela",cat:"courage"},
{text:"I have not failed. I've just found 10,000 ways that won't work.",author:"Thomas Edison",cat:"humor"},
{text:"The only thing we have to fear is fear itself.",author:"Franklin D. Roosevelt",cat:"courage"},
{text:"Two things are infinite: the universe and human stupidity; and I'm not sure about the universe.",author:"Albert Einstein",cat:"humor"},
{text:"Imagination is more important than knowledge.",author:"Albert Einstein",cat:"science"},
{text:"The important thing is not to stop questioning. Curiosity has its own reason for existing.",author:"Albert Einstein",cat:"science"},
{text:"Science is not only a disciple of reason but also one of romance and passion.",author:"Stephen Hawking",cat:"science"},
{text:"Look deep into nature, and then you will understand everything better.",author:"Albert Einstein",cat:"science"},
{text:"Not all those who wander are lost.",author:"J.R.R. Tolkien",cat:"wisdom"},
{text:"Life is what happens when you're busy making other plans.",author:"John Lennon",cat:"humor"},
{text:"Darkness cannot drive out darkness; only light can do that.",author:"Martin Luther King Jr.",cat:"wisdom"},
{text:"It does not matter how slowly you go as long as you do not stop.",author:"Confucius",cat:"wisdom"},
{text:"We love because it is the only true adventure.",author:"Nikki Giovanni",cat:"love"},
{text:"The universe is under no obligation to make sense to you.",author:"Neil deGrasse Tyson",cat:"science"},
{text:"I think, therefore I am.",author:"René Descartes",cat:"wisdom"},
{text:"To love and be loved is to feel the sun from both sides.",author:"David Viscott",cat:"love"}
];

let filtered=quotes,index=0,favorites=new Set();
const bgAudio=document.getElementById('bg-audio'),canvas=document.getElementById('bg'),ctx=canvas.getContext('2d');

// BG particles
canvas.width=innerWidth;canvas.height=innerHeight;
const pts=[];for(let i=0;i<40;i++)pts.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-.5)*.2,vy:(Math.random()-.5)*.2,s:Math.random()*1.5+.3,a:Math.random()*.3+.05});
function drawBg(){ctx.fillStyle='rgba(13,13,13,0.06)';ctx.fillRect(0,0,canvas.width,canvas.height);pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>canvas.width)p.vx*=-1;if(p.y<0||p.y>canvas.height)p.vy*=-1;ctx.beginPath();ctx.arc(p.x,p.y,p.s,0,Math.PI*2);ctx.fillStyle=`rgba(212,165,116,${p.a})`;ctx.fill()});requestAnimationFrame(drawBg)}
drawBg();
addEventListener('resize',()=>{canvas.width=innerWidth;canvas.height=innerHeight});

function showQuote(){
    const q=filtered[index];
    const el=document.getElementById('quote-text');
    el.style.animation='none';void el.offsetWidth;el.style.animation='quoteReveal .8s ease';
    el.textContent=`"${q.text}"`;
    document.getElementById('quote-author').textContent=`— ${q.author}`;
    document.getElementById('quote-category').textContent=q.cat.toUpperCase();
    document.getElementById('btn-fav').textContent=favorites.has(q.text)?'♥ Saved':'♡ Save';
}

document.getElementById('start-btn').addEventListener('click',()=>{
    document.getElementById('intro-screen').classList.remove('active');
    document.getElementById('quote-screen').classList.add('active');
    document.getElementById('fav-count').classList.add('visible');
    bgAudio.volume=.25;bgAudio.play().catch(()=>{});
    showQuote();
});

document.getElementById('btn-next').addEventListener('click',()=>{index=(index+1)%filtered.length;showQuote()});
document.getElementById('btn-prev').addEventListener('click',()=>{index=(index-1+filtered.length)%filtered.length;showQuote()});

document.getElementById('btn-fav').addEventListener('click',()=>{
    const q=filtered[index];
    if(favorites.has(q.text)){favorites.delete(q.text)}else{favorites.add(q.text)}
    document.getElementById('fav-num').textContent=favorites.size;
    document.getElementById('btn-fav').textContent=favorites.has(q.text)?'♥ Saved':'♡ Save';
    showToast(favorites.has(q.text)?'Added to favorites':'Removed from favorites');
});

document.getElementById('btn-copy').addEventListener('click',()=>{
    const q=filtered[index];
    navigator.clipboard.writeText(`"${q.text}" — ${q.author}`).then(()=>showToast('Copied to clipboard!'));
});

document.querySelectorAll('[data-cat]').forEach(btn=>{
    btn.addEventListener('click',()=>{
        document.querySelectorAll('[data-cat]').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        const cat=btn.dataset.cat;
        filtered=cat==='all'?quotes:quotes.filter(q=>q.cat===cat);
        index=0;showQuote();
    });
});

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}

// Keyboard nav
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')document.getElementById('btn-next').click();if(e.key==='ArrowLeft')document.getElementById('btn-prev').click()});
// Swipe nav
let tx=0;document.addEventListener('touchstart',e=>tx=e.touches[0].clientX);
document.addEventListener('touchend',e=>{const d=e.changedTouches[0].clientX-tx;if(Math.abs(d)>50){d<0?document.getElementById('btn-next').click():document.getElementById('btn-prev').click()}});
    </script>
</body>
</html>
